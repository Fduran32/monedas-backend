name: CI/CD Monedas Duoc

on:
  push:
    branches: [ "main" ] # Se ejecuta automáticamente al hacer push a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 21 en GitHub
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Compilar y construir el JAR con Maven
        run: mvn clean package -DskipTests

      - name: Copiar archivo JAR al servidor EC2 vía SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 1

      - name: Ejecutar la aplicacion en la EC2 vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Detener la aplicación anterior si estaba corriendo en el puerto 8080
            sudo fuser -k 8080/tcp || true
            # Ejecutar el nuevo JAR en segundo plano y guardar logs
            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/app.log 2>&1 &